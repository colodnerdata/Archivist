# Ollama
# Override this if Ollama is reachable on a different host, such as a WSL bridge IP.
ollama_base_url: "http://localhost:11434"
triage_model: "gemma4:e4b"
summarize_model: "gemma4:e4b"
# vision_model must be a vision-capable Ollama model (llava, moondream, etc.)
# phi4:14b is text-only and cannot process images.
vision_model: "llava:13b"

# Performance
triage_batch_size: 8
max_text_tokens: 2000

# Cross-drive deduplication registry
kept_hashes_path: "kept_hashes.csv"

# Optional: treat a previously scanned CSV as an authoritative baseline.
# Example: scan C first, then set this to reports/drive_c.csv before scanning D or E.
baseline_scan_csv: "reports/drive_c.csv"

# Recovery destination root
recovery_root: "/mnt/e/recovered"

# Scan exclusions
exclude_dirs:
  - "$RECYCLE.BIN"
  - "System Volume Information"
  - "Windows"
  - "Program Files"
  - "Program Files (x86)"
  - "ProgramData"
  - "AppData"
  # Windows NTFS junction points in user profiles (legacy redirects, always inaccessible)
  - "Application Data"
  - "Cookies"
  - "Local Settings"
  - "My Documents"
  - "NetHood"
  - "PrintHood"
  - "Recent"
  - "SendTo"
  - "Start Menu"
  - "Templates"
  - "My Music"
  - "My Pictures"
  - "My Videos"

exclude_extensions:
  - .exe
  - .msi
  - .dll
  - .sys
  - .tmp
  - .log
  - .ini
  - .lnk
  - .url
  - .db
  - .cache

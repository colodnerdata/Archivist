# Ollama
ollama_base_url: "http://localhost:11434"
triage_model: "qwen3:4b"
summarize_model: "phi4:14b"
# vision_model is used for images.
vision_model: "qwen3-vl:8b"
# vision_pdf_model is used for PDFs detected as more than plain text
# (embedded images, sparse text, charts, forms, scanned pages).
vision_pdf_model: "qwen3-vl:8b-thinking"

# Performance
triage_batch_size: 1
max_text_tokens: 2000

# Triage debugging
triage_debug_print_prompt: true
triage_debug_stream_output: true
triage_debug_prompt_batches: 3
triage_debug_prompt_max_chars: 8000

# Cross-drive deduplication registry
kept_hashes_path: "kept_hashes.csv"

# Recovery destination root
recovery_root: "E:\\recovered"

# Scan exclusions
exclude_dirs:
  - "$RECYCLE.BIN"
  - "System Volume Information"
  - "Windows"
  - "Program Files"
  - "Program Files (x86)"
  - "ProgramData"
  - "AppData"

exclude_extensions:
  - .exe
  - .msi
  - .dll
  - .sys
  - .tmp
  - .log
  - .ini
  - .lnk
  - .url
  - .db
  - .cache
